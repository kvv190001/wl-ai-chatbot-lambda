image: atlassian/default-image:3

pipelines:
  branches:
    main:
      - step:
          name: Build and Push Image
          services:
            - docker
          caches:
            - docker
          script:
            - cd my_deployment_package

            # Install AWS CLI
            - apt-get update && apt-get install -y awscli

            # Define image tag
            - export IMAGE_TAG=$BITBUCKET_COMMIT
            - export IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME:$IMAGE_TAG

            # Login to ECR
            - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

            # Build image
            - docker build -t $IMAGE_URI .

            # Push image
            - docker push $IMAGE_URI

            # Save image uri for next step
            - echo $IMAGE_URI > image_uri.txt

          artifacts:
            - my_deployment_package/image_uri.txt

      - step:
          name: Deploy Lambda
          image: amazon/aws-cli
          script:
            - export IMAGE_URI=$(cat my_deployment_package/image_uri.txt)

            - aws lambda update-function-code \
                --function-name $LAMBDA_FUNCTION_NAME \
                --image-uri $IMAGE_URI \
                --region $AWS_REGION

            - aws lambda wait function-updated \
                --function-name $LAMBDA_FUNCTION_NAME \
                --region $AWS_REGION

            - echo "Deployment complete!"
