image: atlassian/default-image:3

pipelines:
  branches:
    main:
      - step:
          name: Build and Deploy
          services:
            - docker
          caches:
            - docker
          script:
            - cd my_deployment_package

            # Install AWS CLI
            - apt-get update && apt-get install -y awscli

            # Set variables
            - export IMAGE_TAG=$BITBUCKET_COMMIT

            # Login to ECR
            - aws ecr get-login-password --region $AWS_REGION |
              docker login --username AWS --password-stdin
              $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

            # Build Docker image for Lambda
            - docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME:$IMAGE_TAG .
            - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME:$IMAGE_TAG

            # Update Lambda function
            - aws lambda update-function-code \
                --function-name $LAMBDA_FUNCTION_NAME \
                --image-uri $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME:$IMAGE_TAG \
                --region $AWS_REGION
            
            # Wait for Lambda function to be updated
            - aws lambda wait function-updated \
                --function-name $LAMBDA_FUNCTION_NAME \
                --region $AWS_REGION